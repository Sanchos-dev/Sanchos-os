name: python-ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Validate manifests
        run: ./scripts/lint-configs.sh
      - name: CLI smoke test
        run: |
          python3 packages/sanchosctl/sanchosctl/cli.py profile list
          python3 packages/sanchosctl/sanchosctl/cli.py module list
          python3 packages/sanchosctl/sanchosctl/cli.py profile info desktop-virt
          python3 packages/sanchosctl/sanchosctl/cli.py module info virtualization
