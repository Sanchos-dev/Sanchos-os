name: python-ci

on:
  push:
  pull_request:

jobs:
  sanchosctl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Syntax check
        run: python -m py_compile packages/sanchosctl/sanchosctl/cli.py
      - name: Smoke test
        run: python packages/sanchosctl/sanchosctl/cli.py profile list
