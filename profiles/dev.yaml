name: dev
summary: Desktop profile with development tooling.
description: Plasma desktop for development work with containers, NekoBox and common CLI tools.
packages:
  - plasma-desktop
  - sddm
  - dolphin
  - konsole
  - kate
  - firefox-esr
  - git
  - curl
  - podman
  - distrobox
  - python3-tk
modules:
  - containers
  - vpn
  - backup
settings:
  desktop_environment: plasma
  display_manager: sddm
  vpn_client: nekobox
