name: desktop-virt
summary: Desktop workstation with local virtualization.
description: Flagship workstation profile with Plasma, KVM/libvirt, container tooling and NekoBox.
packages:
  - plasma-desktop
  - sddm
  - dolphin
  - konsole
  - kate
  - firefox-esr
  - network-manager
  - plasma-nm
  - pipewire
  - pipewire-pulse
  - wireplumber
  - wl-clipboard
  - xdg-desktop-portal-kde
  - qemu-kvm
  - qemu-system
  - qemu-utils
  - libvirt-daemon-system
  - libvirt-clients
  - virt-manager
  - virtinst
  - ovmf
  - bridge-utils
  - dnsmasq-base
  - podman
  - distrobox
modules:
  - virtualization
  - containers
  - vpn
  - backup
settings:
  desktop_environment: plasma
  display_manager: sddm
  virtualization_enabled: true
  libvirtd_enabled: true
  vpn_client: nekobox
