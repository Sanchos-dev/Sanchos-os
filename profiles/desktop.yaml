name: desktop
summary: Daily-driver desktop profile.
description: Standard workstation profile with Plasma, sane defaults and the default desktop VPN client.
packages:
  - plasma-desktop
  - sddm
  - dolphin
  - konsole
  - kate
  - firefox-esr
  - network-manager
  - plasma-nm
  - pipewire
  - pipewire-pulse
  - wireplumber
  - wl-clipboard
  - xdg-desktop-portal-kde
  - podman
  - distrobox
modules:
  - vpn
  - containers
settings:
  desktop_environment: plasma
  display_manager: sddm
  vpn_client: nekobox
