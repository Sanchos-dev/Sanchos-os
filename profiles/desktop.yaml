name: desktop
summary: Daily-use Plasma desktop profile.
description: Plasma desktop with branding, first-boot setup and NekoBox as the default VPN client.
packages:
  - plasma-desktop
  - sddm
  - dolphin
  - konsole
  - kate
  - firefox-esr
  - network-manager
  - plasma-nm
  - pipewire
  - pipewire-pulse
  - wireplumber
  - wl-clipboard
  - xdg-desktop-portal-kde
  - python3-tk
modules:
  - vpn
  - backup
settings:
  desktop_environment: plasma
  display_manager: sddm
  vpn_client: nekobox
