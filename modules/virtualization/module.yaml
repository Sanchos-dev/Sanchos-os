name: virtualization
summary: Local VM host functionality.
description: Enables the host-side virtualization stack used by desktop-virt systems.
packages:
  - qemu-kvm
  - qemu-system
  - qemu-utils
  - libvirt-daemon-system
  - libvirt-clients
  - virt-manager
  - virtinst
  - ovmf
  - bridge-utils
  - dnsmasq-base
services:
  - libvirtd
artifacts:
  - /etc/libvirt/libvirtd.conf.d/10-sanchos.conf
  - /etc/qemu/bridge.conf
notes:
  - The first iteration uses libvirt and virsh rather than a custom management daemon.
